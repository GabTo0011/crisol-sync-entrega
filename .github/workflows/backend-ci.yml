name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

env:
  NODE_ENV: test
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/crisol_test
  DIRECT_URL: postgresql://postgres:postgres@localhost:5432/crisol_test
  SUPABASE_URL: https://fake.supabase.co
  SUPABASE_SERVICE_ROLE_KEY: fake-service-role-key-for-ci
  JWT_SECRET: ci-test-jwt-secret-not-real
  JWT_EXPIRES_IN: 7d
  FRONTEND_URL: http://localhost:5173

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - run: npm run lint

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run unit tests with coverage
        run: npm run test:cov

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage/
          retention-days: 14

      - name: Check coverage thresholds
        run: |
          node -e "
            const report = require('./coverage/coverage-summary.json');
            const total = report.total;
            const stmts = total.statements.pct;
            const branches = total.branches.pct;
            const funcs = total.functions.pct;
            const lines = total.lines.pct;
            console.log('Coverage Summary:');
            console.log('  Statements:', stmts + '%');
            console.log('  Branches:  ', branches + '%');
            console.log('  Functions: ', funcs + '%');
            console.log('  Lines:     ', lines + '%');
            if (lines < 40) {
              console.error('ERROR: Line coverage ' + lines + '% is below minimum 40%');
              process.exit(1);
            }
          "

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [lint]
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: crisol_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: Run E2E tests
        run: npm run test:e2e

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test-unit]
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build
        run: npm run build

      - name: Verify dist exists
        run: test -d dist && echo "Build successful"

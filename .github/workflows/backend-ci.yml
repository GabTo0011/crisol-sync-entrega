name: Backend CI/CD

on:
  push:
    branches: [main, development]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main, development]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  # ============================================================
  # CI — Runs on ALL branches (development + main)
  # ============================================================

  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - run: npm run lint

  test-unit:
    name: Unit Tests + Coverage
    runs-on: ubuntu-latest
    needs: [lint]
    environment: production
    defaults:
      run:
        working-directory: backend

    env:
      NODE_ENV: test
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      JWT_EXPIRES_IN: ${{ secrets.JWT_EXPIRES_IN }}
      FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
      AZURE_OCR_ENDPOINT: ${{ secrets.AZURE_OCR_ENDPOINT }}
      AZURE_OCR_KEY: ${{ secrets.AZURE_OCR_KEY }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run unit tests with coverage
        run: npm run test:cov

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage/
          retention-days: 14

      - name: Check coverage thresholds
        run: |
          node -e "
            const report = require('./coverage/coverage-summary.json');
            const total = report.total;
            const lines = total.lines.pct;
            console.log('Coverage — Lines:', lines + '%');
            if (lines < 40) {
              console.error('FAIL: Line coverage ' + lines + '% is below minimum 40%');
              process.exit(1);
            }
            console.log('PASS: Coverage threshold met.');
          "

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [lint]
    environment: production
    defaults:
      run:
        working-directory: backend

    env:
      NODE_ENV: test
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      JWT_EXPIRES_IN: ${{ secrets.JWT_EXPIRES_IN }}
      FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
      AZURE_OCR_ENDPOINT: ${{ secrets.AZURE_OCR_ENDPOINT }}
      AZURE_OCR_KEY: ${{ secrets.AZURE_OCR_KEY }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: Run E2E tests
        run: npm run test:e2e

  # ============================================================
  # CD — Runs ONLY on main branch
  # ============================================================

  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: [test-unit, test-e2e]
    if: github.ref == 'refs/heads/main'
    environment: production
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: crisol-sync-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image was built
        run: echo "Docker image built successfully — ready for deploy"

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service crisol-sync-backend
